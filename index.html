<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone音声解析アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #result { margin: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; border: none; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
    </style>
</head>
<body>

    <h1>音声解析アプリ</h1>
    <button id="micBtn" class="btn start">マイクをON</button>
    <div id="result">ここに結果が表示されます</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const resultDiv = document.getElementById('result');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuxfmwuMfTaI2GIf8tCfKBm-PgHqHyFn6g97Vs-h7QmFchUrBT-nw8lgIN-QlNNOBK/exec";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true; // 途中経過も表示
        recognition.continuous = true;     // 連続認識

        let isRecognizing = false;

        micBtn.addEventListener('click', () => {
            if (isRecognizing) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        recognition.onstart = () => {
            isRecognizing = true;
            micBtn.innerText = "マイクをOFF";
            micBtn.className = "btn stop";
            resultDiv.innerText = "録音中...何か話してください";
        };

        recognition.onend = () => {
            isRecognizing = false;
            micBtn.innerText = "マイクをON";
            micBtn.className = "btn start";
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                finalTranscript += event.results[i][0].transcript;
            }
            
            // 認識中のテキストを表示
            resultDiv.innerText = "認識中: " + finalTranscript;

            // 確定した結果が送られてきたらGASへ送信
            if (event.results[event.results.length - 1].isFinal) {
                resultDiv.innerText = "Geminiに送信中...";
                fetch(GAS_URL + "?text=" + encodeURIComponent(finalTranscript))
                    .then(res => res.text())
                    .then(data => {
                        resultDiv.innerText = "Geminiの回答: " + data;
                    })
                    .catch(err => {
                        resultDiv.innerText = "通信エラー: " + err;
                    });
            }
        };

        recognition.onerror = (event) => {
            resultDiv.innerText = "エラー発生: " + event.error;
            isRecognizing = false;
        };
    </script>
</body>
</html>
