<h1>音声解析アプリ</h1>
    <button id="micBtn" class="btn start">マイクをON</button>
    <button id="analyzeBtn" class="btn" style="background:#2196F3; color:white;">解析する</button>
    <button id="resetBtn" class="btn" style="background:#607d8b; color:white;">リセット</button>
    
    <div id="result">ここに結果が表示されます</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultDiv = document.getElementById('result');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycK0mKAeYIbckOhiV8iIT1ERiXS4wnb6XYO-ILfBBqvIBHQekduXgGILCESusxkSWO/exechttps://script.google.com/macros/s/AKfycbycK0mKAeYIbckOhiV8iIT1ERiXS4wnb6XYO-ILfBBqvIBHQekduXgGILCESusxkSWO/exec";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = false;

        let isRecognizing = false;
        let transcriptBuffer = ""; 

        // 1. マイクON/OFF
        micBtn.addEventListener('click', () => {
            if (isRecognizing) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        // 2. 解析ボタン (手動で送信)
        analyzeBtn.addEventListener('click', () => {
            if (transcriptBuffer === "") {
                alert("記録がありません");
                return;
            }
            resultDiv.innerText = "解析中...";
            fetch(GAS_URL + "?text=" + encodeURIComponent(transcriptBuffer))
                .then(res => res.text())
                .then(data => {
                    resultDiv.innerHTML = "<strong>薬歴案:</strong><br>" + data.replace(/\n/g, '<br>');
                })
                .catch(err => resultDiv.innerText = "通信エラー: " + err);
        });

        // 3. リセットボタン
        resetBtn.addEventListener('click', () => {
            if(confirm("記録を消去しますか？")) {
                transcriptBuffer = "";
                resultDiv.innerText = "記録をリセットしました";
            }
        });

        recognition.onstart = () => {
            isRecognizing = true;
            micBtn.innerText = "マイクをOFF";
            micBtn.className = "btn stop";
        };

        recognition.onend = () => {
            if (isRecognizing) {
                try { recognition.start(); } catch(e) {}
            } else {
                micBtn.innerText = "マイクをON";
                micBtn.className = "btn start";
            }
        };

        recognition.onresult = (event) => {
            let interimTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    transcriptBuffer += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            resultDiv.innerText = "認識中: " + transcriptBuffer + interimTranscript;
        };
    </script>
