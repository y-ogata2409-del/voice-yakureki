<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone音声解析アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #result { margin: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; border: none; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
    </style>
</head>
<body>

    <h1>音声解析アプリ</h1>
    <button id="micBtn" class="btn start">マイクをON</button>
    <div id="result">ここに結果が表示されます</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const resultDiv = document.getElementById('result');
        const GAS_URL = "あなたのGASのデプロイURL";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = false; // iOS対策

        let isRequestedON = false; // 「ユーザーがONを望んでいるか」を管理するフラグ

        micBtn.addEventListener('click', () => {
            if (isRequestedON) {
                // 停止処理
                isRequestedON = false; // フラグを下ろす
                recognition.stop();    // 止める
            } else {
                // 開始処理
                isRequestedON = true;  // フラグを立てる
                recognition.start();
            }
        });

        recognition.onstart = () => {
            micBtn.innerText = "マイクをOFF";
            micBtn.className = "btn stop";
            resultDiv.innerText = "録音中...喋ってください";
        };

        // 終了したとき
        recognition.onend = () => {
            if (isRequestedON) {
                // ユーザーがまだONを望んでいるなら再起動
                try { recognition.start(); } catch(e) {}
            } else {
                // ユーザーが停止を望んだ場合
                micBtn.innerText = "マイクをON";
                micBtn.className = "btn start";
                resultDiv.innerText = "停止しました";
            }
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                finalTranscript += event.results[i][0].transcript;
            }
            resultDiv.innerText = "認識中: " + finalTranscript;

            if (event.results[event.results.length - 1].isFinal) {
                resultDiv.innerText = "送信中...";
                fetch(GAS_URL + "?text=" + encodeURIComponent(finalTranscript))
                    .then(res => res.text())
                    .then(data => {
                        resultDiv.innerText = "結果: " + data;
                    })
                    .catch(err => {
                        resultDiv.innerText = "通信エラー";
                    });
            }
        };
    </script>
</body>
</html>
