<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>薬歴作成AI</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            margin: 0; 
            background-color: #f4f4f9;
        }
        h1 { font-size: 1.5rem; text-align: center; }
        
        /* ボタンエリアを横並び/縦並びで調整 */
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .btn { 
            padding: 18px; 
            font-size: 1rem; 
            border-radius: 12px; 
            border: none; 
            color: white; 
            font-weight: bold;
        }
        #micBtn { grid-column: span 2; } /* マイクは全幅 */
        
        #result { 
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
            min-height: 200px;
            font-size: 1.1rem;
            line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .start { background: #2e7d32; }
        .stop { background: #c62828; }
        .analyze { background: #1565c0; }
        .reset { background: #546e7a; }
    </style>
</head>
<body>

    <h1>薬歴作成ツール</h1>
    
    <div class="controls">
        <button id="micBtn" class="btn start">マイクをON</button>
        <button id="analyzeBtn" class="btn analyze">解析する</button>
        <button id="resetBtn" class="btn reset">リセット</button>
    </div>
    
    <div id="result">ここに結果が表示されます</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultDiv = document.getElementById('result');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxgxstZU1ogSnHSTkJoSaW1RDpisohZf82jFiLOCF3ETxaKBkuQOmdBSRrPz6HKFb_4/exec";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = false;

        let isRecognizing = false;
        let transcriptBuffer = ""; 

        // 1. マイクON/OFF
        micBtn.addEventListener('click', () => {
            if (isRecognizing) {
                isRecognizing = false; // ★ここを追加！これで「止める意思」が伝わる
                recognition.stop();
            } else {
                recognition.start();
            }
        });

        // 2. 解析ボタンの修正部分
        analyzeBtn.addEventListener('click', () => {
            if (transcriptBuffer === "") {
                alert("記録がありません");
                return;
            }
            resultDiv.innerText = "解析中...";
            fetch(GAS_URL + "?text=" + encodeURIComponent(transcriptBuffer))
                .then(res => res.text())
                .then(data => {
                    resultDiv.innerHTML = "<strong>薬歴案:</strong><br>" + data.replace(/\n/g, '<br>');
                    
                    // ★ここに追加：解析成功後にバッファをクリアする
                    transcriptBuffer = ""; 
                })
                .catch(err => resultDiv.innerText = "通信エラー: " + err);
        });

        // 3. リセットボタン
        resetBtn.addEventListener('click', () => {
            if(confirm("記録を消去しますか？")) {
                transcriptBuffer = "";
                resultDiv.innerText = "記録をリセットしました";
            }
        });

        recognition.onstart = () => {
            isRecognizing = true;
            micBtn.innerText = "マイクをOFF";
            micBtn.className = "btn stop";
        };

        // 録音が終了したとき
        recognition.onend = () => {
            if (isRecognizing) {
                // 自動再起動（マイクをONのままの場合）
                try { 
                    recognition.start(); 
                } catch (e) {
                    // エラー時は停止状態にする
                    isRecognizing = false;
                    micBtn.innerText = "マイクをON";
                    micBtn.className = "btn start";
                }
            } else {
                // 停止処理（マイクをOFFボタンを押した時）
                micBtn.innerText = "マイクをON";
                micBtn.className = "btn start";
            }
        };

        recognition.onresult = (event) => {
            let interimTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    transcriptBuffer += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            resultDiv.innerText = "認識中: " + transcriptBuffer + interimTranscript;
        };
    </script>
