<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone音声解析アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #result { margin: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; border: none; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
    </style>
</head>
<body>

    <h1>音声解析アプリ</h1>
    <button id="micBtn" class="btn start">マイクをON</button>
    <div id="result">ここに結果が表示されます</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const resultDiv = document.getElementById('result');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuxfmwuMfTaI2GIf8tCfKBm-PgHqHyFn6g97Vs-h7QmFchUrBT-nw8lgIN-QlNNOBK/exec";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = false;

        // ボタンの切り替え状態を管理
        let isRecognizing = false;

        micBtn.addEventListener('click', () => {
            if (isRecognizing) {
                // 停止処理
                recognition.stop();
            } else {
                // 開始処理
                recognition.start();
            }
        });

        // 「開始」された瞬間にボタンの見た目を更新
        recognition.onstart = () => {
            isRecognizing = true;
            micBtn.innerText = "マイクをOFF";
            micBtn.className = "btn stop"; // ここで赤色系のCSSスタイル（stop）を適用
        };
        
        // 録音が終了したとき
        recognition.onend = () => {
            // もし「録音中フラグ」が立っているなら、即座に再起動する
            if (isRecognizing) {
                try {
                    recognition.start();
                } catch (e) {
                    // すでに開始している場合などのエラーを握りつぶす
                }
            } else {
                // ユーザーが停止した場合は、ボタンを戻す
                micBtn.innerText = "マイクをON";
                micBtn.className = "btn start";
                resultDiv.innerText = "停止しました";
            }
        };
        let transcriptBuffer = ""; // これまで認識した内容を溜めておく変数

        recognition.onresult = (event) => {
            let interimTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    transcriptBuffer += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            
            // これまで蓄積した内容 + 現在変換中の内容を表示
            resultDiv.innerText = "認識中: " + transcriptBuffer + interimTranscript;
            
            if (event.results[0].isFinal) {
                resultDiv.innerText = "送信中...";
                fetch(GAS_URL + "?text=" + encodeURIComponent(transcript))
                    .then(res => res.text())
                    .then(data => resultDiv.innerText = "Geminiの回答: " + data)
                    .catch(err => resultDiv.innerText = "通信エラー: " + err);
            }
        };

        recognition.onerror = (event) => {
            resultDiv.innerText = "エラー: " + event.error;
            isRecognizing = false;
            // エラー時もボタンを戻す
            micBtn.innerText = "マイクをON";
            micBtn.className = "btn start";
        };
    </script>
</body>
</html>
