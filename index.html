<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone音声解析アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #result { margin: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px; }
        .btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 30px; border: none; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
    </style>
</head>
<body>

    <h1>音声解析アプリ</h1>
    <button id="micBtn" class="btn start">マイクをON</button>
    <div id="result">ここに結果が表示されます</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const resultDiv = document.getElementById('result');
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzuxfmwuMfTaI2GIf8tCfKBm-PgHqHyFn6g97Vs-h7QmFchUrBT-nw8lgIN-QlNNOBK/exec";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = false; // iOS対策で連続認識はOFF

        let isRecognizing = false; // 現在録音中かどうかのフラグ

        micBtn.addEventListener('click', () => {
            if (isRecognizing) {
                // 録音中なら止める
                recognition.stop();
            } else {
                // 停止中なら開始する
                try {
                    recognition.start();
                } catch(e) {
                    resultDiv.innerText = "起動エラー: " + e.message;
                }
            }
        });

        // 録音が開始されたとき
        recognition.onstart = () => {
            isRecognizing = true;
            micBtn.innerText = "マイクをOFF";
            micBtn.className = "btn stop"; // 赤色系のクラス
            resultDiv.innerText = "録音中...話してください";
        };

        // 録音が停止したとき
        recognition.onend = () => {
            isRecognizing = false;
            micBtn.innerText = "マイクをON";
            micBtn.className = "btn start"; // 緑色系のクラス
            resultDiv.innerText = "停止しました";
        };

        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript;
            resultDiv.innerText = "認識中: " + transcript;
            
            if (event.results[0].isFinal) {
                resultDiv.innerText = "送信中...";
                fetch(GAS_URL + "?text=" + encodeURIComponent(transcript))
                    .then(res => res.text())
                    .then(data => resultDiv.innerText = "結果: " + data)
                    .catch(err => resultDiv.innerText = "通信エラー: " + err);
            }
        };

        recognition.onerror = (event) => {
            isRecognizing = false;
            resultDiv.innerText = "エラー: " + event.error;
        };
    </script>
</body>
</html>
